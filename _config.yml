# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Victoria Brodie
email: me@victoriabrodie.nyc
description: Victoria Brodie is a technical writer and documentation strategist specializing in cybersecurity. She's currently at Arctic Wolf where she leads documentation migration and rebranding efforts following the acquisition of Sevco Security, the startup where she spent nearly four years building a documentation program from the ground up.
github_username: vbrodie
minimal_mistakes_skin: default


# Build settings
markdown: kramdown
theme: minimal-mistakes-jekyll


include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache


atom_feed:
  hide: true


defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: splash

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# AUTHOR INFO

author:
  avatar: /assets/images/author_victoria.jpg
  email: "me@victoriabrodie.nyc"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/victoria-brodie"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/vbrodie"
    - label: "Download PDF"
      icon: "fas fa-fw fa-download"
      url: "/assets/VBrodie_Resume2026.pdf"